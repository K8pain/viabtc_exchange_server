services:
  mysql:
    image: mysql:8.0
    container_name: mvp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exchange_lab
      MYSQL_USER: exchange
      MYSQL_PASSWORD: exchange_pass
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mvp_mysql_data:/var/lib/mysql
    networks: [mvp_lab_net]

  redis:
    image: redis:7
    container_name: mvp_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mvp_redis_data:/data
    networks: [mvp_lab_net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mvp_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo ruok | nc -w 2 127.0.0.1 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [mvp_lab_net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mvp_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-lc", "kafka-topics --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks: [mvp_lab_net]

volumes:
  mvp_mysql_data:
  mvp_redis_data:

networks:
  mvp_lab_net:
    name: mvp_lab_net
